# SPDX-License-Identifier: Apache-2.0

description: FPH RC7620 modem wired for the Waitara control board

compatible: "fph,rc7620"

include: uart-device.yaml

properties:
  mdm-rail-en-gpios:
    type: phandle-array
    required: true

  mdm-pwr-on-gpios:
    type: phandle-array
    required: true

  mdm-reset-gpios:
    type: phandle-array
    required: true

  auto-start:
    type: boolean

  mdm-power-gpios:
    type: phandle-array

  mdm-wake-gpios:
    type: phandle-array

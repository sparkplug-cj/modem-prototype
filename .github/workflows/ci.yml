name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  host-tests:
    name: Host Catch2 tests
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install -U pip west pyelftools
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gperf ccache device-tree-compiler gcc-multilib g++-multilib

      - name: Download Zephyr SDK
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.17.2/zephyr-sdk-0.17.2_linux-x86_64_minimal.tar.xz
          tar -xf zephyr-sdk-0.17.2_linux-x86_64_minimal.tar.xz
          ./zephyr-sdk-0.17.2/setup.sh -t arm-zephyr-eabi -h

      - name: Set Zephyr environment
        run: |
          echo "ZEPHYR_TOOLCHAIN_VARIANT=zephyr" >> $GITHUB_ENV
          echo "ZEPHYR_SDK_INSTALL_DIR=$GITHUB_WORKSPACE/zephyr-sdk-0.17.2" >> $GITHUB_ENV

      - name: Update west dependencies
        run: west update

      - name: Run platform Catch2 tests
        run: |
          cmake -S platform/tests/catch2 -B platform/tests/catch2/build
          cmake --build platform/tests/catch2/build
          ctest --test-dir platform/tests/catch2/build --output-on-failure

      - name: Run control Catch2 tests
        run: |
          cmake -S control/tests/catch2 -B control/tests/catch2/build
          cmake --build control/tests/catch2/build
          ctest --test-dir control/tests/catch2/build --output-on-failure

  firmware-build:
    name: Zephyr firmware build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install -U pip west pyelftools
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gperf ccache device-tree-compiler gcc-multilib g++-multilib

      - name: Download Zephyr SDK
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.17.2/zephyr-sdk-0.17.2_linux-x86_64_minimal.tar.xz
          tar -xf zephyr-sdk-0.17.2_linux-x86_64_minimal.tar.xz
          ./zephyr-sdk-0.17.2/setup.sh -t arm-zephyr-eabi -h

      - name: Set Zephyr environment
        run: |
          echo "ZEPHYR_TOOLCHAIN_VARIANT=zephyr" >> $GITHUB_ENV
          echo "ZEPHYR_SDK_INSTALL_DIR=$GITHUB_WORKSPACE/zephyr-sdk-0.17.2" >> $GITHUB_ENV

      - name: Update west dependencies
        run: west update

      - name: Build control firmware
        run: west build control -p auto -b control@a4 --shield sense_a3 -d control/build

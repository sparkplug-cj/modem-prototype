name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  host-tests:
    name: Host Catch2 tests
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Zephyr workspace
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: .
          toolchains: arm-zephyr-eabi
          sdk-version: 0.17.2

      - name: Run platform Catch2 tests
        run: |
          cmake -S platform/tests/catch2 -B platform/tests/catch2/build
          cmake --build platform/tests/catch2/build
          ctest --test-dir platform/tests/catch2/build --output-on-failure

      - name: Run control Catch2 tests
        run: |
          cmake -S control/tests/catch2 -B control/tests/catch2/build
          cmake --build control/tests/catch2/build
          ctest --test-dir control/tests/catch2/build --output-on-failure

  firmware-build:
    name: Zephyr firmware build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Zephyr workspace
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: .
          toolchains: arm-zephyr-eabi
          sdk-version: 0.17.2

      - name: Build control firmware
        run: west build control -p auto -b control@a4 --shield sense_a3 -d control/build
